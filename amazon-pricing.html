<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亚马逊欧洲站定价计算器</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#0f1923;color:#e8edf0;padding:16px;min-height:100vh
  }
  .wrap{max-width:960px;margin:0 auto}
  h1{font-size:20px;margin-bottom:2px}
  h1 span{color:#ff9900}
  .sub{color:#8899aa;font-size:12px;margin-bottom:20px}

  .card{
    background:#1a2833;border:1px solid #2a4050;border-radius:10px;
    padding:14px;margin-bottom:12px
  }
  .card-t{
    font-size:12px;font-weight:600;color:#8899aa;text-transform:uppercase;
    letter-spacing:.8px;margin-bottom:10px
  }

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:600px){.grid2{grid-template-columns:1fr}}

  label{display:block;font-size:12px;color:#8899aa;margin-bottom:3px}
  .ig{margin-bottom:8px}
  input{
    width:100%;padding:8px 10px;border-radius:6px;
    border:1px solid #2a4050;background:#1f3342;
    color:#e8edf0;font-size:14px;outline:0
  }
  input:focus{border-color:#ff9900}
  .ir{display:flex;gap:8px}
  .ir .ig{flex:1}

  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
  thead th{
    text-align:left;padding:8px 6px;border-bottom:2px solid #ff9900;
    color:#8899aa;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    font-weight:600;white-space:nowrap;position:sticky;top:0;background:#1a2833;z-index:1
  }
  tbody td{padding:7px 6px;border-bottom:1px solid #1f3342}
  tbody tr:hover{background:rgba(255,153,0,.04)}
  .tr-alt{background:rgba(255,255,255,.015)}

  .flag{font-size:16px;margin-right:3px}
  .price{font-weight:700;color:#ff9900;font-size:14px}
  .cny{color:#8899aa;font-size:11px}
  .profit{font-weight:600}
  .green{color:#4ade80}
  .red{color:#f87171}
  .dim{color:#8899aa}
  .size-tag{
    display:inline-block;padding:1px 6px;border-radius:4px;
    font-size:10px;background:#1f3342;color:#8899aa
  }

  .note{
    background:rgba(255,153,0,.06);border:1px solid #ff9900;
    border-radius:6px;padding:8px 12px;font-size:11px;
    color:#8899aa;margin-top:12px;line-height:1.5
  }

  .summary-card{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:8px;margin-bottom:12px
  }
  .stat{
    background:#1f3342;border-radius:8px;padding:10px;text-align:center
  }
  .stat .num{font-size:20px;font-weight:700;color:#ff9900}
  .stat .lbl{font-size:11px;color:#8899aa;margin-top:2px}

  .mob-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table td, table th{padding:6px 5px}

  .good-note{margin-top:4px;font-size:11px;color:#667;line-height:1.4}

  @media(max-width:480px){
    body{padding:10px}
    .card{padding:10px}
    table{font-size:12px}
    table td,table th{padding:4px 4px}
  }
</style>
</head>
<body>
<div class="wrap">

<h1>🛒 亚马逊<span>欧洲站</span>定价计算器</h1>
<div class="sub">簇绒地毯专用 · 一键查看10国售价与利润</div>

<!-- Input -->
<div class="card">
  <div class="card-t">📐 产品信息</div>
  <div class="grid2">
    <div class="ir">
      <div class="ig"><label>宽 (cm)</label><input type="number" id="w" value="120" oninput="calc()"></div>
      <div class="ig"><label>高 (cm)</label><input type="number" id="h" value="160" oninput="calc()"></div>
    </div>
    <div class="ig"><label>克重 (g/m²)</label><input type="number" id="gsm" value="800" oninput="calc()"></div>
  </div>
  <div class="grid2">
    <div class="ig"><label>采购价 (元/m²)</label><input type="number" id="cost" value="60" oninput="calc()"></div>
    <div class="ig"><label>头程运费 (元/kg)</label><input type="number" id="ship" value="20" oninput="calc()"></div>
  </div>
  <div class="grid2" style="margin-top:6px">
    <div class="ig"><label>目标净利润率 (%)</label><input type="number" id="profit" value="20" oninput="calc()"></div>
    <div></div>
  </div>
</div>

<!-- Summary -->
<div class="summary-card" id="summaryBox"></div>

<!-- All Countries Table -->
<div class="card" style="padding-bottom:4px;">
  <div class="card-t">🌍 10国售价对比</div>
  <div class="mob-scroll">
  <table id="resultTable">
    <thead>
      <tr>
        <th>国家</th>
        <th>货币</th>
        <th>到岸成本</th>
        <th>VAT</th>
        <th>佣金</th>
        <th>FBA费</th>
        <th>建议售价</th>
        <th>人民币售价</th>
        <th>净利润</th>
        <th>净利率</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  </div>
  <div class="good-note">
    💡 体积重 = 长×宽×2.5cm ÷ 5000。FBA按体积重与实重的较大值计费。所有费用为估算值，实际以亚马逊官方为准。
  </div>
</div>

</div>

<script>
const COUNTRIES = [
  {id:'de',name:'德国',flag:'🇩🇪',cur:'EUR',sym:'€',vat:19,rate:7.80,
   fbaS:4.20,fbaSk:0.80,fbaL:5.80,fbaLk:1.05,fbaO:11.00,fbaOk:0.70},
  {id:'uk',name:'英国',flag:'🇬🇧',cur:'GBP',sym:'£',vat:20,rate:9.10,
   fbaS:4.50,fbaSk:0.85,fbaL:6.20,fbaLk:1.10,fbaO:12.00,fbaOk:0.75},
  {id:'fr',name:'法国',flag:'🇫🇷',cur:'EUR',sym:'€',vat:20,rate:7.80,
   fbaS:4.30,fbaSk:0.82,fbaL:5.90,fbaLk:1.08,fbaO:11.50,fbaOk:0.72},
  {id:'it',name:'意大利',flag:'🇮🇹',cur:'EUR',sym:'€',vat:22,rate:7.80,
   fbaS:4.25,fbaSk:0.80,fbaL:5.85,fbaLk:1.05,fbaO:11.30,fbaOk:0.70},
  {id:'es',name:'西班牙',flag:'🇪🇸',cur:'EUR',sym:'€',vat:21,rate:7.80,
   fbaS:4.15,fbaSk:0.78,fbaL:5.70,fbaLk:1.02,fbaO:11.00,fbaOk:0.68},
  {id:'nl',name:'荷兰',flag:'🇳🇱',cur:'EUR',sym:'€',vat:21,rate:7.80,
   fbaS:4.40,fbaSk:0.85,fbaL:6.00,fbaLk:1.10,fbaO:12.00,fbaOk:0.75},
  {id:'be',name:'比利时',flag:'🇧🇪',cur:'EUR',sym:'€',vat:21,rate:7.80,
   fbaS:4.25,fbaSk:0.82,fbaL:5.85,fbaLk:1.07,fbaO:11.50,fbaOk:0.72},
  {id:'se',name:'瑞典',flag:'🇸🇪',cur:'SEK',sym:'kr',vat:25,rate:0.72,
   fbaS:45,fbaSk:8,fbaL:60,fbaLk:10,fbaO:110,fbaOk:7},
  {id:'pl',name:'波兰',flag:'🇵🇱',cur:'PLN',sym:'zł',vat:23,rate:1.70,
   fbaS:18,fbaSk:3.5,fbaL:25,fbaLk:4.5,fbaO:45,fbaOk:3},
  {id:'ie',name:'爱尔兰',flag:'🇮🇪',cur:'EUR',sym:'€',vat:23,rate:7.80,
   fbaS:4.50,fbaSk:0.88,fbaL:6.30,fbaLk:1.15,fbaO:12.50,fbaOk:0.78}
];

function $(id){return document.getElementById(id)}
function fmt(n,d){d=d||2;return Number(n).toFixed(d)}

function calc(){
  const w=parseFloat($('w').value)||0,h=parseFloat($('h').value)||0,
        g=parseFloat($('gsm').value)||0,
        cp=parseFloat($('cost').value)||0,
        sp=parseFloat($('ship').value)||0,
        tp=parseFloat($('profit').value)||0;

  if(!w||!h||!g)return;

  const area=w*h/10000;
  const aW=area*g/1000;          // actual weight kg
  const vW=w*h*2.5/5000;         // volumetric weight kg
  const bW=Math.max(aW,vW);      // billable weight
  const pCost=area*cp;
  const sCost=aW*sp;
  const lCost=pCost+sCost;

  // Summary
  $('summaryBox').innerHTML=
    `<div class="stat"><div class="num">${fmt(area)}</div><div class="lbl">面积 (m²)</div></div>
     <div class="stat"><div class="num">${fmt(aW)}</div><div class="lbl">实重 (kg)</div></div>
     <div class="stat"><div class="num">${fmt(vW)}</div><div class="lbl">体积重 (kg)</div></div>
     <div class="stat"><div class="num">¥${fmt(lCost)}</div><div class="lbl">到岸成本</div></div>`;

  // Table
  const referral=0.15;
  let rows='';
  COUNTRIES.forEach((c,i)=>{
    // FBA tier
    let fba;
    let tier='S';
    if(bW<=1.2){fba=c.fbaS+c.fbaSk*bW}
    else if(bW<=3){fba=c.fbaL+c.fbaLk*bW;tier='L'}
    else{fba=c.fbaO+c.fbaOk*bW;tier='O'}

    const vatP=c.vat/100;
    const targetP=tp/100;
    const fbaCNY=fba*c.rate;
    const denom=1-vatP-referral-targetP;

    let priceLoc=0,priceRMB=0,pRMB=0,pPct=0;
    if(denom>0){
      priceRMB=(fbaCNY+lCost)/denom;
      priceLoc=priceRMB/c.rate;
      pRMB=priceLoc*(1-vatP-referral)*c.rate-fbaCNY-lCost;
      pPct=pRMB/(priceLoc*c.rate)*100;
    }

    const alt=i%2?'tr-alt':'';
    rows+=`<tr class="${alt}">
      <td><span class="flag">${c.flag}</span>${c.name}</td>
      <td class="dim">${c.cur}</td>
      <td class="dim">¥${fmt(lCost)}</td>
      <td>${c.vat}%</td>
      <td>${referral*100}%</td>
      <td class="dim">${c.sym}${fmt(fba)} <span class="size-tag">${tier}</span></td>
      <td class="price">${c.sym}${fmt(priceLoc)}</td>
      <td class="cny">≈ ¥${fmt(priceRMB)}</td>
      <td class="profit ${pRMB>=0?'green':'red'}">¥${fmt(pRMB)}</td>
      <td class="profit ${pPct>=0?'green':'red'}">${fmt(pPct)}%</td>
    </tr>`;
  });
  $('tbody').innerHTML=rows;
}

calc();
</script>
</body>
</html>
