<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>agilepad · 随手记</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0c29;
    --sidebar: #1a1838;
    --editor-bg: #13112e;
    --text: #e8e8f0;
    --text-dim: rgba(255,255,255,.3);
    --text-muted: rgba(255,255,255,.18);
    --border: rgba(255,255,255,.07);
    --accent: #f7971e;
    --accent2: #ffd200;
    --radius: 10px;
    --shadow: 0 4px 20px rgba(0,0,0,.3);
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
  }

  /* ===== 侧栏 ===== */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    transition: transform .3s;
    z-index: 10;
  }

  .sidebar-header {
    padding: 18px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 18px;
    font-weight: 700;
  }
  .sidebar-title span { color: var(--accent2); }

  .sidebar-actions { display: flex; gap: 6px; }

  .sidebar-btn {
    background: rgba(255,255,255,.06);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .sidebar-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
  .sidebar-btn:active { transform: scale(.93); }

  .sidebar-search {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .sidebar-search input::placeholder { color: var(--text-muted); }
  .sidebar-search input:focus { border-color: var(--accent); }

  .notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .notes-list::-webkit-scrollbar { width: 4px; }
  .notes-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

  .note-item {
    padding: 12px;
    border-radius: var(--radius);
    cursor: pointer;
    margin-bottom: 4px;
    transition: all .15s;
    position: relative;
    border: 1px solid transparent;
  }
  .note-item:hover { background: rgba(255,255,255,.04); }
  .note-item.active {
    background: rgba(247,151,30,.1);
    border-color: rgba(247,151,30,.2);
  }
  .note-item .ni-title {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .note-item .ni-preview {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .note-item .ni-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .note-item .ni-tag {
    font-size: 10px;
    padding: 1px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,.06);
  }

  .sidebar-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    align-items: center;
  }
  .sidebar-footer strong { color: var(--text-dim); }

  /* ===== 主编辑区 ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    min-width: 0;
  }

  /* 工具栏 */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.02);
    flex-wrap: wrap;
    user-select: none;
  }

  .toolbar-group {
    display: flex;
    gap: 2px;
    align-items: center;
    padding: 0 6px;
    border-right: 1px solid var(--border);
  }
  .toolbar-group:last-child { border-right: none; }

  .tb-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-dim);
    width: 34px; height: 34px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .12s;
    font-family: inherit;
  }
  .tb-btn:hover { background: rgba(255,255,255,.08); color: #fff; }
  .tb-btn.active { background: rgba(247,151,30,.2); color: var(--accent2); border-color: rgba(247,151,30,.2); }

  .tb-select {
    background: rgba(255,255,255,.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 5px 8px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    font-family: inherit;
  }
  .tb-select:focus { border-color: var(--accent); }

  .tb-color-wrap {
    position: relative;
    display: inline-flex;
  }
  .tb-color-wrap input[type="color"] {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    cursor: pointer;
  }

  .tb-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }

  /* 编辑器容器 */
  .editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* 标题输入 */
  .editor-title-wrap {
    padding: 20px 32px 8px;
    border-bottom: 1px solid var(--border);
  }
  .editor-title {
    width: 100%;
    background: none;
    border: none;
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    outline: none;
    font-family: inherit;
  }
  .editor-title::placeholder { color: var(--text-muted); }

  /* 正文编辑器（可编辑区） */
  .editor-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 32px 40px;
    font-size: 16px;
    line-height: 1.8;
    outline: none;
    color: var(--text);
  }
  .editor-body::-webkit-scrollbar { width: 6px; }
  .editor-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 3px; }
  .editor-body::-webkit-scrollbar-track { background: transparent; }

  .editor-body:empty::before {
    content: '开始写点什么...';
    color: var(--text-muted);
    pointer-events: none;
  }

  .editor-body h1 { font-size: 24px; margin: 20px 0 10px; color: #fff; font-weight: 700; }
  .editor-body h2 { font-size: 20px; margin: 16px 0 8px; color: #fff; font-weight: 600; }
  .editor-body h3 { font-size: 18px; margin: 12px 0 6px; color: #e0e0f0; font-weight: 600; }
  .editor-body p { margin: 4px 0; }
  .editor-body ul, .editor-body ol { padding-left: 24px; margin: 6px 0; }
  .editor-body li { margin: 2px 0; }
  .editor-body blockquote {
    border-left: 3px solid var(--accent);
    padding: 8px 16px;
    margin: 12px 0;
    background: rgba(247,151,30,.06);
    border-radius: 0 6px 6px 0;
    color: rgba(255,255,255,.7);
    font-style: italic;
  }
  .editor-body pre {
    background: rgba(0,0,0,.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 10px 0;
    font-family: 'Menlo', 'Monaco', monospace;
    font-size: 14px;
    overflow-x: auto;
    color: #a8e6cf;
  }
  .editor-body a { color: #6dd5fa; text-decoration: underline; }

  .editor-footer {
    padding: 8px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    background: rgba(255,255,255,.02);
  }
  .editor-footer .ef-right { display: flex; gap: 16px; }

  /* ===== 空状态 ===== */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 12px;
    padding: 40px;
  }
  .empty-state .es-icon { font-size: 56px; opacity: .4; }
  .empty-state .es-title { font-size: 18px; color: var(--text-dim); }
  .empty-state .es-sub { font-size: 14px; }

  /* ===== 移动端适配 ===== */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: 0; top: 0;
      width: 280px;
      transform: translateX(-100%);
      box-shadow: 4px 0 30px rgba(0,0,0,.5);
    }
    .sidebar.open { transform: translateX(0); }

    .sidebar-toggle {
      display: flex !important;
      position: fixed;
      top: 12px; left: 12px;
      z-index: 20;
      background: rgba(15,12,41,.9);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px; height: 40px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 20px;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .editor-title-wrap { padding: 16px 20px 8px; }
    .editor-body { padding: 12px 20px 40px; font-size: 15px; }
    .editor-footer { padding: 8px 20px; flex-wrap: wrap; gap: 4px; }

    .toolbar { padding: 6px 12px; gap: 1px; }
    .toolbar-group { padding: 0 3px; }
    .tb-btn { width: 30px; height: 30px; font-size: 13px; }
    .tb-select { font-size: 11px; padding: 3px 5px; }
  }

  .sidebar-toggle { display: none; }

  /* ===== 遮罩 ===== */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4);
    z-index: 9;
  }
  .overlay.show { display: block; }

  /* ===== 新笔记过渡 ===== */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .editor-wrap { animation: fadeSlideIn .25s ease; }
</style>
</head>
<body>

<!-- 侧栏 -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">agile<span>pad</span></div>
    <div class="sidebar-actions">
      <button class="sidebar-btn" onclick="newNote()" title="新建笔记">＋</button>
      <button class="sidebar-btn" onclick="exportNotes()" title="导出">📤</button>
      <button class="sidebar-btn" onclick="if(confirm('清空所有笔记？')){clearAll()}" title="清空">🗑️</button>
    </div>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="搜索笔记..." oninput="renderSidebar()">
  </div>
  <div class="notes-list" id="notesList"></div>
  <div class="sidebar-footer">
    <span>共 <strong id="totalCount">0</strong> 篇</span>
    <span style="flex:1"></span>
    <span id="todayCountSidebar"></span>
  </div>
</div>

<!-- 主编辑区 -->
<div class="main">
  <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>

  <!-- 工具栏 -->
  <div class="toolbar" id="toolbar">
    <!-- 字号 -->
    <div class="toolbar-group">
      <select class="tb-select" id="fontSize" onchange="execCmd('fontSize', this.value)" title="字号">
        <option value="3">正文</option>
        <option value="1">小</option>
        <option value="2">中</option>
        <option value="4">大</option>
        <option value="5">超大</option>
        <option value="6">标题</option>
      </select>
    </div>

    <!-- 样式 -->
    <div class="toolbar-group">
      <button class="tb-btn" onclick="execCmd('bold')" title="粗体"><b>B</b></button>
      <button class="tb-btn" onclick="execCmd('italic')" title="斜体"><i>I</i></button>
      <button class="tb-btn" onclick="execCmd('underline')" title="下划线"><u>U</u></button>
      <button class="tb-btn" onclick="execCmd('strikeThrough')" title="删除线"><s>S</s></button>
    </div>

    <!-- 段落 -->
    <div class="toolbar-group">
      <button class="tb-btn" onclick="execCmd('formatBlock','h2')" title="标题1">H1</button>
      <button class="tb-btn" onclick="execCmd('formatBlock','h3')" title="标题2">H2</button>
      <button class="tb-btn" onclick="execCmd('formatBlock','p')" title="正文">¶</button>
      <button class="tb-btn" onclick="execCmd('insertUnorderedList')" title="无序列表">☰</button>
      <button class="tb-btn" onclick="execCmd('insertOrderedList')" title="有序列表">#.</button>
    </div>

    <!-- 对齐 -->
    <div class="toolbar-group">
      <button class="tb-btn" onclick="execCmd('justifyLeft')" title="左对齐">≡</button>
      <button class="tb-btn" onclick="execCmd('justifyCenter')" title="居中">≡</button>
      <button class="tb-btn" onclick="execCmd('justifyRight')" title="右对齐">≡</button>
    </div>

    <!-- 插入 -->
    <div class="toolbar-group">
      <button class="tb-btn" onclick="execCmd('createLink')" title="链接">🔗</button>
      <button class="tb-btn" onclick="execCmd('insertHorizontalRule')" title="分割线">—</button>
      <div class="tb-color-wrap">
        <button class="tb-btn" title="颜色">🎨</button>
        <input type="color" onchange="execCmd('foreColor',this.value)">
      </div>
      <button class="tb-btn" onclick="execCmd('removeFormat')" title="清除格式">✕</button>
    </div>

    <!-- 额外功能 -->
    <div class="toolbar-group">
      <button class="tb-btn" onclick="toggleSource()" title="切换源码">⟨⟩</button>
    </div>
  </div>

  <!-- 编辑器 -->
  <div class="editor-wrap" id="editorArea">
    <div class="empty-state" id="emptyState">
      <div class="es-icon">📝</div>
      <div class="es-title">选择或新建一条笔记</div>
      <div class="es-sub">左侧列表 · 或点 ＋ 开始记录</div>
    </div>

    <div id="editorContent" style="display:none;flex-direction:column;height:100%;">
      <div class="editor-title-wrap">
        <input class="editor-title" id="editorTitle" placeholder="标题" oninput="autoSave()">
      </div>
      <div class="editor-body" id="editorBody" contenteditable="true" oninput="autoSave()"></div>
      <div class="editor-footer">
        <span id="charCount">0 字</span>
        <div class="ef-right">
          <span>自动保存 ✓</span>
          <span id="saveTime"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ====== 数据 ======
const STORAGE_KEY = 'agilepad_notes';
let currentId = null;
let saveTimer = null;

function loadNotes() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveNotes(notes) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
}

function getNote(id) {
  return loadNotes().find(n => n.id === id);
}

function updateNote(id, data) {
  const notes = loadNotes();
  const idx = notes.findIndex(n => n.id === id);
  if (idx === -1) return;
  notes[idx] = { ...notes[idx], ...data, updated: Date.now() };
  saveNotes(notes);
}

// ====== 侧栏 ======
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function renderSidebar() {
  const notes = loadNotes();
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const list = document.getElementById('notesList');

  let filtered = query
    ? notes.filter(n => n.title.toLowerCase().includes(query) ||
        (n.content || '').toLowerCase().includes(query))
    : notes;

  // 按更新时间排序
  filtered.sort((a, b) => (b.updated || b.created) - (a.updated || a.created));

  document.getElementById('totalCount').textContent = notes.length;
  const today = new Date().toDateString();
  document.getElementById('todayCountSidebar').textContent =
    notes.filter(n => new Date(n.created).toDateString() === today).length ? `今日 ${notes.filter(n => new Date(n.created).toDateString() === today).length} 篇` : '';

  if (!filtered.length) {
    list.innerHTML = `<div style="text-align:center;padding:40px 16px;color:var(--text-muted);font-size:13px;">
      ${query ? '🔍 没有匹配结果' : '📝 还没有笔记'}
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(n => {
    const isActive = n.id === currentId;
    const plain = stripHtml(n.content || '').substring(0, 40);
    const time = formatDate(n.updated || n.created);
    return `<div class="note-item ${isActive ? 'active' : ''}" onclick="selectNote(${n.id})">
      <div class="ni-title">${escapeHtml(n.title || '无标题')}</div>
      <div class="ni-preview">${escapeHtml(plain) || '空白笔记'}</div>
      <div class="ni-meta">
        <span>${time}</span>
        <span class="ni-tag">${n.tag || '📝'}</span>
      </div>
    </div>`;
  }).join('');
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
  if (diff < 172800000) return '昨天';
  return d.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
}

// ====== 编辑器 ======
function showEditor(id) {
  const note = getNote(id);
  if (!note) return;

  currentId = id;
  document.getElementById('emptyState').style.display = 'none';
  const ec = document.getElementById('editorContent');
  ec.style.display = 'flex';

  document.getElementById('editorTitle').value = note.title || '';
  document.getElementById('editorBody').innerHTML = note.content || '';

  updateCharCount();
  renderSidebar();

  // 移动端自动关侧栏
  if (window.innerWidth <= 768) toggleSidebar();
}

function selectNote(id) {
  // 保存当前
  saveCurrent();
  showEditor(id);
}

function newNote() {
  saveCurrent();
  const note = {
    id: Date.now(),
    title: '',
    content: '',
    tag: '📝',
    created: Date.now(),
    updated: Date.now()
  };
  const notes = loadNotes();
  notes.unshift(note);
  saveNotes(notes);
  showEditor(note.id);

  // 聚焦标题
  setTimeout(() => document.getElementById('editorTitle').focus(), 100);
}

function deleteCurrent() {
  if (!currentId) return;
  if (!confirm('删除这条笔记？')) return;
  const notes = loadNotes().filter(n => n.id !== currentId);
  saveNotes(notes);
  currentId = null;
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('editorContent').style.display = 'none';
  renderSidebar();
}

function autoSave() {
  if (!currentId) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const title = document.getElementById('editorTitle').value.trim();
    const content = document.getElementById('editorBody').innerHTML;

    if (!title && !stripHtml(content)) return;

    updateNote(currentId, {
      title: title || '无标题',
      content: content
    });

    document.getElementById('saveTime').textContent = '已保存 ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    renderSidebar();
  }, 500);

  updateCharCount();
}

function saveCurrent() {
  if (!currentId) return;
  clearTimeout(saveTimer);
  const title = document.getElementById('editorTitle').value.trim();
  const content = document.getElementById('editorBody').innerHTML;
  if (title || stripHtml(content)) {
    updateNote(currentId, {
      title: title || '无标题',
      content: content
    });
  }
}

function updateCharCount() {
  const body = document.getElementById('editorBody');
  const text = stripHtml(body.innerHTML);
  document.getElementById('charCount').textContent = `${text.length} 字`;
}

// ====== 富文本命令 ======
function execCmd(command, value) {
  document.getElementById('editorBody').focus();
  if (command === 'createLink') {
    const url = prompt('输入链接URL:', 'https://');
    if (url) document.execCommand(command, false, url);
    return;
  }
  if (command === 'formatBlock') {
    document.execCommand(command, false, value);
    return;
  }
  document.execCommand(command, false, value);
  autoSave();
}

// ====== 快捷键 ======
document.addEventListener('keydown', (e) => {
  // Ctrl+B / Ctrl+I / Ctrl+U
  if ((e.ctrlKey || e.metaKey) && ['b','i','u'].includes(e.key)) {
    const map = { b: 'bold', i: 'italic', u: 'underline' };
    execCmd(map[e.key]);
    e.preventDefault();
  }
  // Ctrl+S 保存
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveCurrent();
  }
  // Ctrl+N 新建
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    newNote();
  }
  // Esc 取消选中
  if (e.key === 'Escape') {
    if (window.innerWidth <= 768 && document.getElementById('sidebar').classList.contains('open')) {
      toggleSidebar();
    }
  }
});

// ====== 导出 ======
function exportNotes() {
  const notes = loadNotes();
  if (!notes.length) { alert('还没有笔记'); return; }

  let md = '# agilepad 导出\n\n';
  notes.sort((a,b) => (b.updated||b.created) - (a.updated||a.created));
  notes.forEach((n, i) => {
    const plain = stripHtml(n.content || '');
    md += `## ${i+1}. ${n.title || '无标题'}\n\n`;
    if (plain) md += plain + '\n\n';
    md += `> ${new Date(n.updated||n.created).toLocaleString('zh-CN')}\n\n`;
    md += '---\n\n';
  });

  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `agilepad_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

function clearAll() {
  saveNotes([]);
  currentId = null;
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('editorContent').style.display = 'none';
  renderSidebar();
}

// ====== 源码模式 ======
let sourceMode = false;
function toggleSource() {
  if (!currentId) return;
  sourceMode = !sourceMode;
  const body = document.getElementById('editorBody');
  if (sourceMode) {
    body.contentEditable = 'false';
    body.textContent = body.innerHTML;
  } else {
    body.innerHTML = body.textContent;
    body.contentEditable = 'true';
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ====== 启动 ======
renderSidebar();
const notes = loadNotes();
if (notes.length > 0) {
  const sorted = [...notes].sort((a,b) => (b.updated||b.created) - (a.updated||a.created));
  showEditor(sorted[0].id);
}
</script>
</body>
