<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵光记事本</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 600px;
    margin-top: 20px;
  }

  /* 头部 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 0 4px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 15px rgba(247, 151, 30, 0.3);
  }

  .logo-text {
    color: #fff;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .logo-text span { color: #ffd200; }

  .header-actions {
    display: flex;
    gap: 10px;
  }

  .header-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7);
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }

  .header-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  .header-btn:active { transform: scale(0.96); }

  /* 输入区域 */
  .input-area {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    backdrop-filter: blur(20px);
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .input-row input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
  }

  .input-row input::placeholder { color: rgba(255,255,255,0.3); }
  .input-row input:focus { border-color: #ffd200; }

  .add-btn {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    border: none;
    border-radius: 10px;
    width: 48px;
    min-width: 48px;
    color: #1a1a2e;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(247, 151, 30, 0.25);
  }

  .add-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(247, 151, 30, 0.35); }
  .add-btn:active { transform: scale(0.95); }

  /* 详情输入（展开） */
  .detail-area {
    display: none;
  }

  .detail-area.show {
    display: block;
  }

  .detail-area textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 16px;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    line-height: 1.6;
    outline: none;
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
    transition: border 0.2s;
  }

  .detail-area textarea:focus { border-color: #ffd200; }
  .detail-area textarea::placeholder { color: rgba(255,255,255,0.25); }

  .detail-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .detail-btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .detail-btn.primary {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #1a1a2e;
    font-weight: 600;
  }

  .detail-btn.secondary {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
  }

  .detail-btn:hover { transform: translateY(-1px); }
  .detail-btn:active { transform: scale(0.96); }

  /* 快捷标签 */
  .tag-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .tag-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }

  .tag-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  .tag-btn.active {
    background: rgba(247, 151, 30, 0.2);
    border-color: #f7971e;
    color: #ffd200;
  }

  /* 统计栏 */
  .stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  .stats-left {
    color: rgba(255,255,255,0.4);
    font-size: 13px;
  }

  .stats-right {
    display: flex;
    gap: 12px;
  }

  .stat-item {
    color: rgba(255,255,255,0.35);
    font-size: 12px;
  }

  .stat-item strong {
    color: rgba(255,255,255,0.6);
    font-weight: 600;
  }

  /* 笔记列表 */
  .notes-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .note-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .note-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }

  .note-card[data-color="idea"]::before { background: linear-gradient(180deg, #f7971e, #ffd200); }
  .note-card[data-color="todo"]::before { background: #6dd5fa; }
  .note-card[data-color="link"]::before { background: #a8e6cf; }
  .note-card[data-color="book"]::before { background: #c06c84; }

  .note-card:hover {
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.15);
    transform: translateX(2px);
  }

  .note-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .note-title {
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    flex: 1;
    padding-left: 8px;
  }

  .note-tag {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.4);
    white-space: nowrap;
    margin-left: 8px;
  }

  .note-detail {
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    line-height: 1.5;
    padding-left: 8px;
    margin-top: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    max-height: 40px;
  }

  .note-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-left: 8px;
  }

  .note-time {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }

  .note-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .note-card:hover .note-actions { opacity: 1; }

  .note-action-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    transition: all 0.15s;
  }

  .note-action-btn:hover {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
  }

  .note-action-btn.del:hover {
    background: rgba(231, 76, 60, 0.2);
    color: #e74c3c;
  }

  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.2);
  }

  .empty-icon {
    font-size: 56px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-text {
    font-size: 16px;
    margin-bottom: 6px;
  }

  .empty-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.15);
  }

  /* 弹窗 */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: #1e1e3a;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    width: 100%;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.08);
    border: none;
    color: rgba(255,255,255,0.4);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  .modal-title {
    color: #fff;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
    padding-right: 40px;
  }

  .modal-tag {
    display: inline-block;
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.4);
    margin-bottom: 16px;
  }

  .modal-body {
    color: rgba(255,255,255,0.75);
    font-size: 15px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .modal-time {
    color: rgba(255,255,255,0.2);
    font-size: 12px;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  /* 移动端横屏适配 */
  @media (max-width: 480px) {
    body { padding: 12px; }
    .container { margin-top: 10px; }
    .logo-text { font-size: 18px; }
    .note-card { padding: 14px; }
    .input-row input { font-size: 14px; padding: 10px 14px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- 头部 -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">💡</div>
      <div class="logo-text">灵光<span>记事本</span></div>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="exportNotes()">📤 导出</button>
      <button class="header-btn" onclick="if(confirm('确定清空所有笔记？')){clearAll()}">🗑️</button>
    </div>
  </div>

  <!-- 快捷标签 -->
  <div class="tag-bar">
    <button class="tag-btn active" data-tag="all" onclick="filterNotes('all',this)">📋 全部</button>
    <button class="tag-btn" data-tag="idea" onclick="filterNotes('idea',this)">💡 灵感</button>
    <button class="tag-btn" data-tag="todo" onclick="filterNotes('todo',this)">📝 待办</button>
    <button class="tag-btn" data-tag="link" onclick="filterNotes('link',this)">🔗 收藏</button>
    <button class="tag-btn" data-tag="book" onclick="filterNotes('book',this)">📖 读书</button>
  </div>

  <!-- 输入区域 -->
  <div class="input-area">
    <div class="input-row">
      <input type="text" id="noteInput" placeholder="记下你的灵光一现..." 
             onkeydown="if(event.key==='Enter'){event.preventDefault();toggleDetail()}">
      <button class="add-btn" onclick="toggleDetail()">＋</button>
    </div>
    <div class="detail-area" id="detailArea">
      <textarea id="noteDetail" placeholder="补充细节（可选）..." rows="3"></textarea>
      <div class="detail-actions">
        <button class="detail-btn secondary" onclick="cycleTag()" id="tagBtn">🏷️ 灵感</button>
        <div style="flex:1"></div>
        <button class="detail-btn secondary" onclick="hideDetail()">取消</button>
        <button class="detail-btn primary" onclick="addNote()">保存</button>
      </div>
    </div>
  </div>

  <!-- 统计 -->
  <div class="stats">
    <div class="stats-left" id="statsLeft">共 <strong>0</strong> 条笔记</div>
    <div class="stats-right">
      <span class="stat-item">今日 <strong id="todayCount">0</strong></span>
    </div>
  </div>

  <!-- 笔记列表 -->
  <div class="notes-list" id="notesList">
    <div class="empty-state">
      <div class="empty-icon">✨</div>
      <div class="empty-text">还没有笔记</div>
      <div class="empty-sub">想到什么好点子，随时记下来吧</div>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)hideModal()">
  <div class="modal">
    <button class="modal-close" onclick="hideModal()">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-tag" id="modalTag"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-time" id="modalTime"></div>
  </div>
</div>

<script>
// ========== 数据管理 ==========
const STORAGE_KEY = 'inspire_notes';
const TAG_NAMES = { idea: '💡 灵感', todo: '📝 待办', link: '🔗 收藏', book: '📖 读书' };
const TAG_ORDER = ['idea', 'todo', 'link', 'book'];
let currentTag = 'all';
let currentTagIndex = 0; // for cycling

function loadNotes() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { return []; }
}

function saveNotes(notes) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
}

// ========== 标签切换 ==========
function cycleTag() {
  currentTagIndex = (currentTagIndex + 1) % TAG_ORDER.length;
  const tag = TAG_ORDER[currentTagIndex];
  document.getElementById('tagBtn').textContent = TAG_NAMES[tag];
}

function getCurrentTag() {
  return TAG_ORDER[currentTagIndex];
}

// ========== 输入控制 ==========
function toggleDetail() {
  const area = document.getElementById('detailArea');
  area.classList.toggle('show');
  if (area.classList.contains('show')) {
    setTimeout(() => document.getElementById('noteDetail').focus(), 100);
  }
}

function hideDetail() {
  document.getElementById('detailArea').classList.remove('show');
  document.getElementById('noteInput').focus();
}

// ========== 添加笔记 ==========
function addNote() {
  const input = document.getElementById('noteInput');
  const detail = document.getElementById('noteDetail');
  const title = input.value.trim();
  const body = detail.value.trim();

  if (!title) { input.focus(); return; }

  const notes = loadNotes();
  notes.unshift({
    id: Date.now(),
    title: title,
    detail: body || '',
    tag: getCurrentTag(),
    time: Date.now(),
    date: new Date().toLocaleDateString('zh-CN')
  });

  saveNotes(notes);
  input.value = '';
  detail.value = '';
  hideDetail();
  renderNotes();
}

// ========== 删除笔记 ==========
function deleteNote(id, e) {
  e.stopPropagation();
  if (!confirm('删除这条笔记？')) return;
  const notes = loadNotes().filter(n => n.id !== id);
  saveNotes(notes);
  renderNotes();
}

// ========== 清除全部 ==========
function clearAll() {
  saveNotes([]);
  renderNotes();
}

// ========== 导出 ==========
function exportNotes() {
  const notes = loadNotes();
  if (!notes.length) { alert('还没有笔记可导出'); return; }

  let text = '📋 灵光记事本 导出\n';
  text += '═'.repeat(30) + '\n\n';
  notes.forEach((n, i) => {
    const tag = TAG_NAMES[n.tag] || '📌';
    text += `${tag} ${n.title}\n`;
    if (n.detail) text += `   ${n.detail}\n`;
    text += `   📅 ${new Date(n.time).toLocaleString('zh-CN')}\n\n`;
  });

  // 创建下载
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `笔记_${new Date().toLocaleDateString('zh-CN')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ========== 查看详情 ==========
function viewNote(id) {
  const notes = loadNotes();
  const note = notes.find(n => n.id === id);
  if (!note) return;

  document.getElementById('modalTitle').textContent = note.title;
  document.getElementById('modalTag').textContent = TAG_NAMES[note.tag] || '📌';
  document.getElementById('modalBody').textContent = note.detail || '（无详情）';
  document.getElementById('modalTime').textContent = `📅 ${new Date(note.time).toLocaleString('zh-CN')}`;

  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function hideModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ========== 过滤 ==========
function filterNotes(tag, btn) {
  currentTag = tag;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderNotes();
}

// ========== 渲染 ==========
function renderNotes() {
  const notes = loadNotes();
  const container = document.getElementById('notesList');

  let filtered = notes;
  if (currentTag !== 'all') {
    filtered = notes.filter(n => n.tag === currentTag);
  }

  // 更新统计
  const today = new Date().toLocaleDateString('zh-CN');
  const todayCount = notes.filter(n => n.date === today).length;
  document.getElementById('todayCount').textContent = todayCount;
  document.getElementById('statsLeft').innerHTML = `共 <strong>${notes.length}</strong> 条笔记`;

  if (!filtered.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${currentTag === 'all' ? '✨' : '🔍'}</div>
        <div class="empty-text">${currentTag === 'all' ? '还没有笔记' : '没有找到匹配的笔记'}</div>
        <div class="empty-sub">${currentTag === 'all' ? '想到什么好点子，随时记下来吧' : '试试切换到其他分类'}</div>
      </div>
    `;
    return;
  }

  container.innerHTML = filtered.map(n => `
    <div class="note-card" data-color="${n.tag || 'idea'}" onclick="viewNote(${n.id})">
      <div class="note-header">
        <div class="note-title">${escapeHtml(n.title)}</div>
        <span class="note-tag">${TAG_NAMES[n.tag] || '📌'}</span>
      </div>
      ${n.detail ? `<div class="note-detail">${escapeHtml(n.detail)}</div>` : ''}
      <div class="note-footer">
        <span class="note-time">${formatTime(n.time)}</span>
        <div class="note-actions">
          <button class="note-action-btn del" onclick="deleteNote(${n.id},event)">删除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatTime(ts) {
  const now = new Date();
  const date = new Date(ts);
  const diff = now - date;

  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return `${Math.floor(diff/60000)}分钟前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}小时前`;
  if (diff < 172800000) return '昨天';
  return date.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
}

// ========== 键盘快捷键 ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    hideModal();
    hideDetail();
  }
});

// Ctrl+Enter 快速保存
document.getElementById('noteDetail').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    addNote();
  }
});

// ========== 启动 ==========
renderNotes();
</script>
</body>
</html>
